<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Privacy Policy — SSAMOK SOFT</title>
  <meta name="description" content="SSAMOK SOFT privacy policy." />
  <meta name="robots" content="index, follow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body data-privacy-app="stopwatcha">
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="/" aria-label="SSAMOK SOFT home">
        <span class="brand__mark" aria-hidden="true"></span>
        <span>SSAMOK SOFT</span>
      </a>
      <nav class="nav__links" aria-label="Primary">
        <a class="nav__link" href="/#apps" data-i18n="nav.apps">Apps</a>
        <a class="nav__link" href="/#contact" data-i18n="nav.contact">Contact</a>
        <div class="lang" id="lang" aria-expanded="false">
          <button class="lang__toggle" id="lang-toggle" aria-haspopup="listbox"
                  data-i18n-attr="aria-label:nav.lang_aria">
            <i class="ti ti-world" aria-hidden="true"></i>
            <span id="lang-current">English</span>
            <i class="ti ti-chevron-down lang__chevron" aria-hidden="true"></i>
          </button>
          <ul class="lang__menu" id="lang-menu" role="listbox"></ul>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <article class="container legal" id="privacy-root"></article>
  </main>

  <footer class="site-footer">
    <div class="container footer__row">
      <div class="footer__links">
        <a href="/privacy/" data-i18n="footer.links.privacy">Privacy Policy</a>
        <a href="/#contact" data-i18n="footer.links.contact">Contact</a>
      </div>
      <p class="footer__meta">
        <span data-i18n="footer.rights">© 2026 SSAMOK SOFT. All rights reserved.</span>
      </p>
    </div>
  </footer>

  <script src="/assets/js/app.js" defer></script>
</body>
</html>
